# A reusable workflow that posts a "pending" notification comment on a PR
# indicating that QEMU validation is waiting for CI to complete.
#
# This is intended to be called from a pull_request_target trigger so that
# the comment appears immediately when a PR is pushed, rather than waiting
# for CI to complete and the QEMU validation workflow to start.
#
# Copyright (c) Microsoft Corporation.
# SPDX-License-Identifier: Apache-2.0
##
name: Patina QEMU PR Validation Pending

on:
  workflow_call:
    inputs:
      pr-number:
        description: "Pull request number in the caller repository"
        required: true
        type: number
      head-sha:
        description: "PR head commit SHA for commit status updates. When empty, no commit status is created."
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  notify-pending:
    name: Post Pending Notification
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.PATINA_AUTOMATION_APPLICATION_ID }}
          private-key: ${{ secrets.PATINA_AUTOMATION_APPLICATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Update PR Comment to Pending
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const issue_number = ${{ inputs.pr-number }};
            const hiddenMarker = '<!-- patina-qemu-validation-result -->';
            const marker = '*This comment was automatically generated by the Patina QEMU PR Validation workflow.*';

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });

            const existingComment = comments.data.find((c) =>
              c.body.includes(hiddenMarker)
            );

            const body = [
              hiddenMarker,
              '## :hourglass: QEMU Validation Pending',
              '',
              'QEMU validation is pending on successful CI completion.',
              '',
              '> **Note:** Any previous results are available in this comment\'s edit history.',
              '',
              marker,
            ].join('\n');

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Set Pending Commit Status
        if: inputs.head-sha != ''
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ inputs.head-sha }}',
              state: 'pending',
              description: 'Waiting for CI to complete',
              context: 'Patina QEMU PR Validation',
            });
